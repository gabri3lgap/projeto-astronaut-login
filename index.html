<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rascunho 06</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <section id="login">
        <div id="imagem"></div>
        <div id="formulario">
            <h1>Login</h1>
            <p>Seja bem vindo(a)!</p>
            <form action="login.php" method="post">
                <div id="user">
                    <input type="email" name="mail" id="imail" placeholder="Usuário ou e-mail">
                    <label for="imail">E-mail</label>
                </div>
                <div id="senha">
                    <input type="password" name="pass" id="ipass" placeholder="Senha">
                    <label for="ipass">Senha</label>
                </div>
                <input type="submit" value="Entrar">
                <div class="esqueci"><a href="esqueci.html">Esqueci a senha</a></div>
            </form>
        </div>
    </section>
</body>
</html>
